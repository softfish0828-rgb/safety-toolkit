<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>委託：事故調查報告 | 澳門建築安全服務</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--p:#1a5f7a;--pd:#134a5f;--a:#f59e0b;--dk:#1e293b;--gr:#64748b;--lt:#f8fafc;--wh:#fff;--err:#dc2626}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;color:var(--dk);line-height:1.7;background:var(--lt)}
nav{position:fixed;top:0;left:0;right:0;background:rgba(255,255,255,.95);backdrop-filter:blur(12px);z-index:999;padding:.9rem 2rem;box-shadow:0 2px 16px rgba(0,0,0,.07)}
.nav-in{max-width:1100px;margin:0 auto;display:flex;justify-content:space-between;align-items:center}
.logo{display:flex;align-items:center;gap:.6rem;text-decoration:none;color:var(--p);font-weight:700;font-size:1.1rem}
.logo-ic{width:38px;height:38px;background:linear-gradient(135deg,var(--p),var(--a));border-radius:9px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.1rem}
.back-btn{display:inline-flex;align-items:center;gap:.5rem;color:var(--gr);text-decoration:none;font-size:.9rem;padding:.5rem 1rem}
.back-btn:hover{background:var(--lt);color:var(--p)}
.hero{padding:7rem 2rem 2rem;text-align:center;background:linear-gradient(160deg,#e0f2fe 0%,#fff 60%)}
.hero h1{font-size:2rem;font-weight:800;color:var(--dk);margin-bottom:.5rem}
.breadcrumb{background:#fff;padding:.8rem 2rem;font-size:.85rem;color:var(--gr)}
.breadcrumb a{color:var(--p);text-decoration:none}
.form-container{max-width:700px;margin:2rem auto;padding:0 2rem 4rem}
.form-card{background:#fff;border-radius:20px;padding:2.5rem;box-shadow:0 4px 30px rgba(0,0,0,.08)}
.form-section{margin-bottom:2rem}
.form-section h2{font-size:1.1rem;font-weight:700;color:var(--dk);margin-bottom:1rem;padding-bottom:.5rem;border-bottom:2px solid var(--p);display:flex;align-items:center;gap:.5rem}
.form-group{margin-bottom:1.2rem}
.form-group label{display:block;font-weight:600;color:var(--dk);margin-bottom:.4rem;font-size:.9rem}
.form-group label .required{color:var(--err)}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:.8rem 1rem;border:1.5px solid #e2e8f0;border-radius:10px;font-size:.95rem;font-family:inherit}
.form-group input:focus,.form-group textarea:focus{outline:none;border-color:var(--p)}
.form-group textarea{min-height:120px;resize:vertical}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.checkbox-group{display:flex;flex-wrap:wrap;gap:.8rem}
.checkbox-item{display:flex;align-items:center;gap:.5rem;background:var(--lt);padding:.6rem 1rem;border-radius:8px;cursor:pointer}
.checkbox-item input{display:none}
.checkbox-item.checked{background:var(--p);color:#fff}
.btn-row{display:flex;gap:1rem;margin-top:2rem}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:.5rem;padding:1rem 2rem;border-radius:10px;font-weight:700;font-size:1rem;text-decoration:none;cursor:pointer;border:none;flex:1}
.btn-primary{background:var(--p);color:#fff}
.btn-secondary{background:var(--lt);color:var(--dk);border:1.5px solid #e2e8f0}
.price-box{background:linear-gradient(135deg,var(--p),var(--pd));color:#fff;padding:1.5rem;border-radius:12px;text-align:center;margin-bottom:1.5rem}
.price-box .amount{font-size:2rem;font-weight:800}
.success-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center}
.success-modal.show{display:flex}
.success-content{background:#fff;border-radius:20px;padding:3rem;text-align:center;max-width:450px;width:90%}
.success-icon{font-size:4rem;margin-bottom:1rem}
@media(max-width:600px){.form-row{grid-template-columns:1fr}}
</style>
</head>
<body>
<nav>
<div class="nav-in">
  <a href="index.html" class="logo"><div class="logo-ic">🏗️</div><span>澳門建築安全服務</span></a>
  <a href="orders.html" class="back-btn">← 返回委託首頁</a>
</div>
</nav>

<div class="breadcrumb"><a href="index.html">主頁</a> / <a href="orders.html">線上委託</a> / 事故調查報告</div>

<section class="hero">
  <h1>🚨 事故調查報告</h1>
  <p>事件經過分析、根本原因探究、改善建議編寫</p>
</section>

<div class="form-container">
  <div class="form-card">
    <div class="price-box"><div class="amount">MOP 400 <small>/份</small></div></div>

    <form id="orderForm">
      <div class="form-section">
        <h2>👤 基本資訊</h2>
        <div class="form-group"><label>公司/工地名稱 <span class="required">*</span></label><input type="text" name="company" required></div>
        <div class="form-row">
          <div class="form-group"><label>聯絡人 <span class="required">*</span></label><input type="text" name="contact" required></div>
          <div class="form-group"><label>聯絡電話 <span class="required">*</span></label><input type="tel" name="phone" required></div>
        </div>
        <div class="form-group"><label>電子郵箱 <span class="required">*</span></label><input type="email" name="email" required></div>
      </div>

      <div class="form-section">
        <h2>🚨 事故詳情</h2>
        <div class="form-group"><label>工地地址 <span class="required">*</span></label><input type="text" name="site_address" required></div>
        <div class="form-row">
          <div class="form-group"><label>事故日期 <span class="required">*</span></label><input type="datetime-local" name="accident_date" required></div>
          <div class="form-group"><label>事故類型 <span class="required">*</span></label>
            <select name="accident_type" required>
              <option value="">請選擇</option>
              <option value="fall">高空墜落</option>
              <option value="strike">物體打擊</option>
              <option value="crush">機械傷害</option>
              <option value="electrical">觸電</option>
              <option value="fire">火災爆炸</option>
              <option value="chemical">中毒窒息</option>
              <option value="other">其他</option>
            </select>
          </div>
        </div>
        <div class="form-group"><label>事故簡述 <span class="required">*</span></label><textarea name="description" required placeholder="請簡述事故經過..."></textarea></div>
        <div class="form-group"><label>傷亡情況</label>
          <div class="checkbox-group">
            <label class="checkbox-item"><input type="checkbox" name="casualty" value="none"> <span>無傷亡</span></label>
            <label class="checkbox-item"><input type="checkbox" name="casualty" value="injury"> <span>輕傷</span></label>
            <label class="checkbox-item"><input type="checkbox" name="casualty" value="hospitalization"> <span>住院</span></label>
            <label class="checkbox-item"><input type="checkbox" name="casualty" value="death"> <span>死亡</span></label>
          </div>
        </div>
        <div class="form-group"><label>語言要求</label>
          <div class="checkbox-group">
            <label class="checkbox-item"><input type="checkbox" name="lang" value="zh"> <span>中文</span></label>
            <label class="checkbox-item"><input type="checkbox" name="lang" value="en"> <span>英文</span></label>
          </div>
        </div>
      </div>

      <div class="form-section">
        <h2>📅 交付要求</h2>
        <div class="form-group"><label>期望交付日期</label><input type="date" name="delivery_date"></div>
        <div class="form-group"><label>其他要求 / 備註</label><textarea name="notes" placeholder="如有特殊要求，請說明..."></textarea></div>
      </div>

      <div class="btn-row">
        <button type="button" class="btn btn-secondary" onclick="history.back()">返回</button>
        <button type="submit" class="btn btn-primary">📤 提交委託</button>
      </div>
    </form>
  </div>
</div>

<div class="success-modal" id="successModal">
  <div class="success-content">
    <div class="success-icon">✅</div>
    <h2>委託已收到！</h2>
    <p>我們將盡快聯絡您確認報價及交付時間。</p>
    <p>WhatsApp：+853 62862878</p>
    <a href="orders.html" class="btn btn-primary" style="display:inline-flex;margin-top:1rem">返回</a>
  </div>
</div>

<script>
document.querySelectorAll('.checkbox-item').forEach(item => {
  item.addEventListener('click', function(e) {
    if (e.target.tagName === 'INPUT') return;
    const input = this.querySelector('input');
    if (input.type === 'radio') document.querySelectorAll(`[name="${input.name}"]`).forEach(r => r.closest('.checkbox-item').classList.remove('checked'));
    input.checked = !input.checked;
    this.classList.toggle('checked', input.checked);
  });
});
document.getElementById('orderForm').addEventListener('submit', function(e) {
  e.preventDefault();
  const fd = new FormData(this);
  const d = {}; fd.forEach((v,k) => d[k]=v);
  const msg = `📋 新委託：事故調查報告\n\n👤 基本資訊\n• 公司：${d.company}\n• 聯絡人：${d.contact}\n• 電話：${d.phone}\n• 電郵：${d.email}\n\n🚨 事故詳情\n• 工地：${d.site_address}\n• 日期：${d.accident_date}\n• 類型：${d.accident_type}\n• 概述：${d.description?.substring(0,100)}...\n• 交付：${d.delivery_date||'盡快'}`;
  window.open(`https://wa.me/85362862878?text=${encodeURIComponent(msg)}`, '_blank');
  document.getElementById('successModal').classList.add('show');
});
</script>
</body>
</html>
